<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="1" stop-color="#1B2A52"/>
    </linearGradient>
    <linearGradient id="accent" x1="210" y1="190" x2="1070" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="0.5" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <filter id="blur" x="0" y="0" width="1280" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="32" fill="url(#bg)"/>

  <g opacity="0.22" filter="url(#blur)">
    <circle cx="238" cy="158" r="110" fill="#7C3AED"/>
    <circle cx="1050" cy="150" r="150" fill="#3B82F6"/>
    <circle cx="980" cy="510" r="130" fill="#14B8A6"/>
  </g>

  <rect x="72" y="70" width="1136" height="500" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>

  <g opacity="0.95">
    <rect x="112" y="118" width="184" height="40" rx="20" fill="rgba(255,255,255,0.08)"/>
    <text x="132" y="144" fill="#C7D2FE" font-size="20" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700">Hermes Skill Pack</text>
